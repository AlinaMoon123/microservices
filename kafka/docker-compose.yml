services:
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk


  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_USER: ${AUTH_USER}
      POSTGRES_PASSWORD: ${AUTH_PASSWORD}
      POSTGRES_DB: ${AUTH_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_USER} -d ${AUTH_NAME}"]
      interval: 1m30s
      timeout: 30s
      retries: 5

  postgres-orders:
    image: postgres:16
    container_name: postgres-orders
    environment:
      POSTGRES_USER: ${ORDER_USER}
      POSTGRES_PASSWORD: ${ORDER_PASSWORD}
      POSTGRES_DB: ${ORDER_NAME}
    ports:
      - "5434:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_USER} -d ${ORDER_NAME}"]
      interval: 1m30s
      timeout: 30s
      retries: 5

  postgres-orchestrator:
    image: postgres:16
    container_name: postgres-orchestrator
    environment:
      POSTGRES_USER: ${ORCHESTRATOR_USER}
      POSTGRES_PASSWORD: ${ORCHESTRATOR_PASSWORD}
      POSTGRES_DB: ${ORCHESTRATOR_NAME}
    ports:
      - "5435:5432"
    volumes:
      - postgres_orchestrator_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORCHESTRATOR_USER} -d ${ORCHESTRATOR_NAME}"]
      interval: 1m30s
      timeout: 30s
      retries: 5

  postgres-notification:
    image: postgres:16
    container_name: postgres-notification
    environment:
      POSTGRES_USER: ${NOTIFICATION_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_NAME}
    ports:
      - "5436:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_USER} -d ${NOTIFICATION_NAME}"]
      interval: 1m30s
      timeout: 30s
      retries: 5

  create_order:
    container_name: order
    build:
      context: ../create_order
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres-orders:
        condition: service_healthy
    ports:
      - "8001:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    
  order_worker:
    container_name: order_worker
    build:
      context: ../create_order
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      
  order_processing:
    container_name: inventory
    build:
      context: ../order_processing
      dockerfile: Dockerfile
    depends_on:
      - kafka-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification:
    container_name: notification
    build:
      context: ../notification
      dockerfile: Dockerfile
    depends_on:
      postgres-notification:
        condition: service_healthy
    volumes:
    - ./notifications:/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  auth:
    container_name: auth
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "8002:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  orchestrator:
    container_name: orchestrator
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    depends_on:
      postgres-orchestrator:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  
  payment:
    container_name: payment
    build:
      context: ../payment
      dockerfile: Dockerfile
    depends_on:
      - kafka-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092


  kafka-init:
    container_name: kafka-init
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    volumes:
      - ./init-topics.sh:/init-topics.sh
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres-auth
      - postgres-orders
      - postgres-orchestrator

volumes:
  postgres_auth_data:
  postgres_orders_data:
  postgres_orchestrator_data:
  postgres_notification_data:
  pgadmin_data: